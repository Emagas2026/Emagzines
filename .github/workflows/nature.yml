name: Nature News
run-name: 'Nature News: ${{ github.ref_name }}'

on:
  workflow_dispatch:
    inputs:
      issue_date:
        description: 'Issue Date (Optional, YYYY-MM-DD)'
        required: false
  # 定时任务已禁用 - 需要时取消注释下面两行
  # schedule:
  #   - cron: '0 0 * * *'

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch and Process
        uses: ./.github/actions/fetch-mag
        with:
          mag_id: nature
          mag_name: "Nature News"
          issue_date: ${{ github.event.inputs.issue_date }}
          github_token: ${{ secrets.GITHUB_TOKEN || github.token }}
