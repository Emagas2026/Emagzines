name: 'Fetch and Process Magazine'
description: 'Install Calibre, run Python script, and push results'

inputs:
  mag_id:
    description: 'Magazine ID (ny, te, tm)'
    required: true
  mag_name:
    description: 'Magazine Name'
    required: true
  issue_date:
    description: 'Issue Date (YYYY-MM-DD)'
    required: false
  github_token:
    description: 'GitHub Token'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Calibre
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libopengl0 libxcb-cursor0 libnss3 libxcomposite1 \
          libxrandr2 libxtst6 libxkbcommon0 libgbm1 libfontconfig1 libgl1 libpulse0 \
          libxrender1 libdbus-1-3 wget libasound2t64
        
        url=https://download.calibre-ebook.com/linux-installer.sh
        sudo -v && wget -nv -O- $url | sudo sh /dev/stdin

    - name: Setup WARP
      if: env.ACT != 'true'
      uses: fscarmen/warp-on-actions@v1.1
      with:
        stack: dual

    - name: Run Processing Script
      shell: bash
      run: python helper/main.py ${{ inputs.mag_id }} "${{ inputs.issue_date }}"

    - name: Upload Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.mag_id }}-${{ env.DATE || 'unknown' }}
        path: converted_ebooks
        retention-days: 14

    - name: Push to 'magzines' branch
      shell: bash
      run: |
        DATE="${{ env.DATE }}"
        MAG_FOLDER="${{ env.MAG_FOLDER }}"
        MAG_NAME="${{ inputs.mag_name }}"

        # 容错：如果 Python 没设置环境变量，尝试从目录猜测
        if [ -z "$DATE" ] && [ -d "../converted_ebooks" ]; then
          DATE=$(ls -1 ../converted_ebooks/ 2>/dev/null | head -n 1)
          echo "DATE guessed from directory: $DATE"
        fi

        if [ -z "$DATE" ] || [ -z "$MAG_FOLDER" ]; then
          echo "⚠️ DATE or MAG_FOLDER not set, skipping push step."
          echo "DATE='$DATE' | MAG_FOLDER='$MAG_FOLDER'"
          exit 0
        fi

        echo "📁 DATE: $DATE"
        echo "📁 MAG_FOLDER: $MAG_FOLDER"
        echo "📁 MAG_NAME: $MAG_NAME"

        if [ ! -d "../converted_ebooks/$DATE" ]; then
          echo "⚠️ No files found to push, skipping."
          exit 0
        fi

        rm -rf repo_magzines

        echo "🔄 Cloning magzines branch..."
        git clone --filter=blob:none --branch magzines --single-branch --depth 1 --sparse \
          https://x-access-token:${{ inputs.github_token }}@github.com/${{ github.repository }}.git repo_magzines

        if [ $? -ne 0 ]; then
          echo "❌ Failed to clone repository"
          exit 0
        fi

        cd repo_magzines
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        YEAR=$(echo "$DATE" | cut -c 1-4)
        git sparse-checkout set "${MAG_FOLDER}/$YEAR" || true
        mkdir -p "${MAG_FOLDER}/$YEAR"

        if [ -d "${MAG_FOLDER}/$YEAR/$DATE" ]; then
          echo "⚠️ Directory already exists, skipping push."
          exit 0
        fi

        echo "📦 Moving files..."
        mv "../converted_ebooks/$DATE" "${MAG_FOLDER}/$YEAR/$DATE"

        git add .
        if git diff --cached --quiet; then
          echo "ℹ️ No changes to commit."
        else
          echo "📝 Committing..."
          git commit -m "Update ${MAG_NAME} - ${DATE} [skip ci]"
          echo "📤 Pushing..."
          git push origin magzines
          echo "✅ Push successful!"
        fi
